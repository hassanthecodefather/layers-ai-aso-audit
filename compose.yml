services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: aso
      POSTGRES_PASSWORD: aso
      POSTGRES_DB: aso_audit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aso -d aso_audit"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
