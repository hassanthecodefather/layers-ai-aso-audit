# Run the whole app with one command:
#
#   docker compose up
#
# Then open http://localhost:4111
#
# The Mastra server serves both the API and the React web UI on port 4111.
# Required env vars (in .env):
#   DATABASE_URL            — Postgres connection string
#   ASO_JWT_SECRET          — JWT signing secret (min 32 chars)
#   LLM_API_KEY             — Google AI Studio API key (or GOOGLE_GENERATIVE_AI_API_KEY)

name: aso-audit-agent

services:
  app:
    build: .
    image: aso-audit-agent:local
    # Loads DATABASE_URL, LLM_API_KEY, ASO_JWT_SECRET, etc. from .env
    env_file:
      - path: .env
        required: false
    environment:
      # .env uses localhost for local dev; inside Docker, localhost is the
      # container itself, so we override to reach Postgres on the host.
      DATABASE_URL: postgresql://aso:aso@host.docker.internal:5432/aso_audit
    extra_hosts:
      # Lets LLM_BASE_URL=http://host.docker.internal:... reach a host-local
      # Ollama (automatic on Docker Desktop; explicit here for Linux too).
      - 'host.docker.internal:host-gateway'
    ports:
      - '4111:4111' # web UI + API
